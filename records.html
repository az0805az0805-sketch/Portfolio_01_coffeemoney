<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>当月の詳細</title>
	<!-- 外部 CSS を通常の相対パスで読み込む -->
	<link rel="stylesheet" href="./css/records.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
	<h2 id="page-title">当月の詳細</h2>

	<table>
		<thead>
			<tr>
				<th>日付</th>
				<th>種類</th>
				<th>金額</th>
				<th>削除</th>
			</tr>
		</thead>

		<!-- JavaScriptで動的に追加される履歴の挿入エリア -->
		<tbody id="record-tbody"></tbody>

		<!-- レコードが 0 件のとき（初期状態は非表示、JSで制御） -->
		<tr id="empty-row" style="display: none;">
			<td colspan="4" style="text-align:center; padding: 20px;">
				この月の記録はありません
			</td>
		</tr>
	</table>

	<div class="summary-box">
		<p>合計金額：<span id="monthly-total">0</span> 円</p>
		<p>予算：<span id="budget">0</span> 円</p>
		<p>残高：<span id="balance">0</span> 円</p>
	</div>

	<!-- JSで動的にパラメータを引き渡すため、idを付与 -->
	<a href="#" id="month-select-link" class="link-button">他の月を見る</a>
	<a href="#" id="back-link" class="detail-button">戻る</a>

	<!-- 外部化したJavaScriptファイルを読み込む -->
	<script src="./js/records.js"></script>
</body>

</html>
