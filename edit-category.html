<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>カテゴリー編集</title>
	
	<link rel="stylesheet" href="./css/edit-category.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

	<h2>カテゴリー編集</h2>

	<!-- サーバー送信を止め、JavaScriptのupdateCategory関数で処理 -->
	<form id="edit-form" onsubmit="updateCategory(event)">
		<!-- ID保持用の隠しフィールド -->
		<input type="hidden" id="category-id" name="id">

		<label>名前：</label>
		<input type="text" id="category-name" name="name" required>

		<label>予算：</label>
		<input type="number" id="category-budget" name="budget">

		<button type="submit">更新</button>
	</form>


	<a href="./home.html">戻る</a>

	<script src="./js/category-edit.js"></script>
</body>

</html>
