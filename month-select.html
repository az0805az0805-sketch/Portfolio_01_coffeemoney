<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<title>月選択</title>
	<link rel="stylesheet" href="./css/month-select.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

	<h2>以前の記録を確認する</h2>

	<form id="month-form" onsubmit="goToMonthlyRecords(event)">
		<label>年：</label>
		<!-- JSで選択肢を入れ込むため、idを付与 -->
		<select id="year-select" name="year"></select>

		<label>月：</label>
		<!-- JSで選択肢を入れ込むため、idを付与 -->
		<select id="month-select" name="month"></select>

		<button type="submit">表示</button>
	</form>

	<!-- JSで戻り先URL（ID付き）を自動設定するためidを付与 -->
	<a href="./index.html" id="back-link">戻る</a>

	<script src="./js/month-select.js"></script>
</body>

</html>
